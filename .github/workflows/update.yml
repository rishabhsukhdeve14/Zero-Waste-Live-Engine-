name: AutoUpdate

permissions:
  contents: write

on:
  workflow_dispatch:

  schedule:
    - cron: "0 * * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - - run: pip install pandas earthengine-api

      - run: python earth_engine.py

      - name: Commit CSV
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "Auto update CSV" || echo "No changes"
          git push