name: Auto Update Data

on:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Run Script
        run: python earth_engine.py